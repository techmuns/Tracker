name = "dashboard-tracker"
main = "src/index.js"
compatibility_date = "2026-06-22"

# The published Google Sheet CSV (File → Share → Publish to web → CSV).
# Change the sheet, and the dashboard reflects it within the cache window (~3 min).
[vars]
CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTtnhH9a-ssSwVT-2xDcN2GtL6yJELJwzs1FYz9pRu4QRkEvSuqZ1WsviXSjowd2WF3vLHnbB0ZAuBH/pub?gid=461407941&single=true&output=csv"

# ── Manual entries (shared) ───────────────────────────────────────────────
# Backed by the "tracker_manual" KV namespace. The binding name MUST stay
# MANUAL (that's what the Worker code reads). To point at a different
# namespace, create one in the Cloudflare dashboard and swap the id below.
[[kv_namespaces]]
binding = "MANUAL"
id = "fe377c45c1fa42cb803f04235c726823"

# Optional: protect the Add/Delete actions with a shared password. Set this as a
# secret (Settings → Variables → Add → Encrypt), then the UI prompts for it once.
#   EDIT_TOKEN = "..."   (prefer a Secret over a plain var)

# Optional: keep the edge cache warm so the first visitor each window is fast.
# [triggers]
# crons = ["*/3 * * * *"]
