name: Deploy to Cloudflare Workers

# Auto-deploy on every push to main (and a manual "Run workflow" button).
# One-time setup: add a repository secret CLOUDFLARE_API_TOKEN
#   (GitHub → Settings → Secrets and variables → Actions → New repository secret).
#   Create the token at Cloudflare → My Profile → API Tokens →
#   "Edit Cloudflare Workers" template.
# If deploys fail with an account error, also add CLOUDFLARE_ACCOUNT_ID.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
